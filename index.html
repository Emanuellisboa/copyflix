<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para começar a assistir na Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body> 
    <main>
        <h1>Quem está assistindo?</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
            <span class="theme-icon">🌙</span>
        </button>
        <section class="profiles"> 
            <a href="catalogo/catalogo.html?profile=jennifer" class="profile-link">
                <article class="profile">
                    <figure>
                        <img src="./assets/perfil-jennifer.png" alt="Perfil de Jennifer com tema Lisa Simpson">
                    </figure>
                    <figcaption>Jennifer</figcaption>
                </article>
            </a>
            <a href="catalogo/catalogo.html?profile=gurgel" class="profile-link">
                <article class="profile">        
                    <figure>
                        <img src="./assets/batman-gurgel.jpg" alt="Perfil de Gurgel com tema Batman">
                    </figure>
                    <figcaption>Gurgel</figcaption>
                </article>
            </a>     
            <a href="catalogo/catalogo.html?profile=mota" class="profile-link">
                <article class="profile">        
                    <figure>
                        <img src="./assets/emanuel-luffy.jpg" alt="Perfil de Mota com tema Luffy">
                    </figure>
                    <figcaption>Mota</figcaption>
                </article>
            </a>
        </section>    
    </main>
    <script src="./script.js"></script>
</body>
</html>
